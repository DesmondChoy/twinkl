name: judge_active_critic_state
description: Score alignment from only the active window_size=1 Critic state
version: "1.0.0"

input_variables:
  - session_content
  - profile_weights
  - value_rubric

template: |
  You are a Judge evaluating a journal session's alignment with Schwartz's Theory of Basic Human Values.

  ## Your Task

  Assign one score to each of the 10 Schwartz value dimensions:

  - **-1 (Misaligned):** The session shows behavior, choices, or expressed attitudes that actively conflict with the value.
  - **0 (Neutral):** The session has no clear relation to the value, or the evidence is too weak to support a non-neutral score.
  - **+1 (Aligned):** The session shows behavior, choices, or expressed attitudes that actively support the value.

  ## Allowed Evidence

  You may use only the two sections below. They are the exact information available to the active `window_size: 1` Critic:

  1. the current journal session; and
  2. the normalized 10-dimensional declared-value profile.

  The profile describes declared priorities. It may help interpret a trade-off, but it cannot by itself justify a non-neutral score. A non-neutral score must be grounded in behavior, choices, or attitudes visible in the current journal session.

  Do not infer or assume any persona biography, demographics, date, prior entries, future entries, labels, rationales, or generation metadata.

  ## Scoring Rules

  - Judge observable behavior and choices, not mood alone.
  - Score each value independently; trade-offs across values are allowed.
  - Be strict with -1 and +1. Use 0 when the session does not support a clear value-specific judgment.

  ## Schwartz Value Rubrics

  {{ value_rubric }}

  ## Normalized Value Profile

  {{ profile_weights }}

  ## Current Journal Session

  {{ session_content }}

  ## Output

  Return ONLY valid JSON with:

  1. integer scores (`-1`, `0`, or `+1`) for every value dimension; and
  2. rationales for non-zero scores only, citing the current journal session.

  ```json
  {
    "scores": {
      "self_direction": <integer>,
      "stimulation": <integer>,
      "hedonism": <integer>,
      "achievement": <integer>,
      "power": <integer>,
      "security": <integer>,
      "conformity": <integer>,
      "tradition": <integer>,
      "benevolence": <integer>,
      "universalism": <integer>
    },
    "rationales": {
      "<value_name>": "<concise evidence-based explanation>",
      "...": "..."
    }
  }
  ```
