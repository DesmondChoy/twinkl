name: weekly_vif_verifier
description: Development-only weekly conflict verifier for the twinkl-752.1 paired Critic-input ablation.
version: '1.0'
input_variables:
  - declared_values
  - cumulative_history
  - current_week_entries
  - critic_block
template: |
  You are evaluating whether the writer made a clear behavior or choice against
  each declared core value. Use only the displayed journal text below.

  A conflict requires directly observable behavior or a choice against the
  declared value. Do not infer conflict from a feeling, wish, guilt, stated
  intention, external constraint, biography, or ambiguous prose. When the text
  cannot support a reliable decision, abstain.

  Return exactly one assessment for every combination of CURRENT-WEEK entry and
  declared core value. Do not assess earlier entries again. An evidence quote
  for a conflict must be an exact substring of that entry. For not_conflict or
  abstain, the evidence quote may be empty.

  DECLARED CORE VALUES
  {{ declared_values }}

  CUMULATIVE STUDENT-VISIBLE HISTORY THROUGH THIS WEEK
  {{ cumulative_history }}

  CURRENT-WEEK ENTRIES TO ASSESS
  {{ current_week_entries }}
  {{ critic_block }}

  The Critic, when present, is a fallible hint rather than a target or rule.
  Journal text remains authoritative. Do not mention model scores in the output.
