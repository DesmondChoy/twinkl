<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Compact Twinkl VIF architecture diagram</title>
  <desc id="desc">A publication-friendly overview of the offline training, runtime scoring, and weekly coaching flow for the Twinkl VIF system.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5F6B7A"/>
    </marker>
    <style>
      text { font-family: Aptos, Calibri, Arial, sans-serif; fill: #1E2430; }
      .lane-title { font-size: 28px; font-weight: 700; letter-spacing: 0.3px; }
      .box-title { font-size: 23px; font-weight: 650; text-anchor: middle; }
      .body { font-size: 20px; text-anchor: middle; }
      .small { font-size: 18px; }
      .lane-offline { fill: #F4FBF8; stroke: #B8D8CF; stroke-width: 2; }
      .lane-runtime { fill: #F4F7FD; stroke: #C5D2F0; stroke-width: 2; }
      .lane-coach { fill: #FFF8EA; stroke: #E6CB8D; stroke-width: 2; }
      .box-offline { fill: #EAF4F1; stroke: #4E8A7C; stroke-width: 2.5; }
      .box-runtime { fill: #EEF2FB; stroke: #5A78B9; stroke-width: 2.5; }
      .box-coach { fill: #FFF4DE; stroke: #C28A1B; stroke-width: 2.5; }
      .line { stroke: #5F6B7A; stroke-width: 3.2; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 10 8; }
      .note { fill: #FFFFFF; stroke: #AAB4C2; stroke-width: 1.8; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="#FFFFFF"/>

  <rect x="40" y="70" width="430" height="740" rx="28" class="lane-offline"/>
  <rect x="510" y="70" width="520" height="740" rx="28" class="lane-runtime"/>
  <rect x="1070" y="70" width="490" height="740" rx="28" class="lane-coach"/>

  <text x="255" y="120" class="lane-title" text-anchor="middle">Offline Training</text>
  <text x="770" y="120" class="lane-title" text-anchor="middle">Runtime Scoring</text>
  <text x="1315" y="120" class="lane-title" text-anchor="middle">Weekly Coaching</text>

  <rect x="80" y="180" width="160" height="120" rx="22" class="box-offline"/>
  <rect x="270" y="180" width="160" height="120" rx="22" class="box-offline"/>
  <rect x="135" y="370" width="240" height="120" rx="22" class="box-offline"/>
  <rect x="135" y="570" width="240" height="120" rx="22" class="box-offline"/>

  <text x="160" y="230" class="box-title">
    <tspan x="160" dy="0">Synthetic</tspan>
    <tspan x="160" dy="28">journals</tspan>
  </text>
  <text x="350" y="230" class="box-title">
    <tspan x="350" dy="0">Judge</tspan>
    <tspan x="350" dy="28">labels</tspan>
  </text>
  <text x="255" y="415" class="box-title">
    <tspan x="255" dy="0">Shared text +</tspan>
    <tspan x="255" dy="28">state representation</tspan>
  </text>
  <text x="255" y="615" class="box-title">
    <tspan x="255" dy="0">Trained VIF</tspan>
    <tspan x="255" dy="28">Critic</tspan>
  </text>

  <path d="M 160 300 L 160 345 L 235 345 L 235 370" class="line"/>
  <path d="M 350 300 L 350 345 L 275 345 L 275 370" class="line"/>
  <path d="M 255 490 L 255 570" class="line"/>

  <rect x="580" y="170" width="380" height="110" rx="22" class="box-runtime"/>
  <rect x="580" y="325" width="380" height="110" rx="22" class="box-runtime"/>
  <rect x="580" y="480" width="380" height="110" rx="22" class="box-runtime"/>
  <rect x="580" y="635" width="380" height="110" rx="22" class="box-runtime"/>

  <text x="770" y="214" class="box-title">
    <tspan x="770" dy="0">Journal history</tspan>
    <tspan x="770" dy="28">+ value profile</tspan>
  </text>
  <text x="770" y="364" class="box-title">
    <tspan x="770" dy="0">Same text + state</tspan>
    <tspan x="770" dy="28">representation</tspan>
  </text>
  <text x="770" y="519" class="box-title">
    <tspan x="770" dy="0">Per-entry VIF scores</tspan>
    <tspan x="770" dy="28">+ uncertainty</tspan>
  </text>
  <text x="770" y="684" class="box-title">
    <tspan x="770" dy="0">Weekly VIF</tspan>
    <tspan x="770" dy="28">signals</tspan>
  </text>

  <path d="M 770 280 L 770 325" class="line"/>
  <path d="M 770 435 L 770 480" class="line"/>
  <path d="M 770 590 L 770 635" class="line"/>

  <rect x="1135" y="195" width="360" height="125" rx="22" class="box-coach"/>
  <rect x="1135" y="395" width="360" height="110" rx="22" class="box-coach"/>
  <rect x="1135" y="580" width="360" height="110" rx="22" class="box-coach"/>

  <text x="1315" y="236" class="box-title">
    <tspan x="1315" dy="0">Weekly alignment check</tspan>
    <tspan x="1315" dy="28">stable / crash / rut</tspan>
    <tspan x="1315" dy="28">high uncertainty</tspan>
  </text>
  <text x="1315" y="440" class="box-title">
    <tspan x="1315" dy="0">Weekly digest</tspan>
  </text>
  <text x="1315" y="625" class="box-title">
    <tspan x="1315" dy="0">Coach reflection</tspan>
  </text>

  <path d="M 1315 320 L 1315 395" class="line"/>
  <path d="M 1315 505 L 1315 580" class="line"/>

  <path d="M 960 690 L 1135 260" class="line"/>
  <path d="M 375 635 C 455 635, 500 535, 580 535" class="line dashed"/>
  <path d="M 375 430 C 460 430, 500 380, 580 380" class="line dashed"/>

  <rect x="570" y="810" width="980" height="58" rx="18" class="note"/>
  <text x="1060" y="846" class="small" text-anchor="middle">
    Current default state: current entry embedding + 10-dim value profile (window_size = 1). Dashed arrows show shared definitions.
  </text>
</svg>
