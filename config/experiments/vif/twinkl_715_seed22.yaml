models_to_train:
  - BalancedSoftmax
encoder_model: nomic-ai/nomic-embed-text-v1.5
truncate_dim: 256
window_size: 1
hidden_dim: 64
dropout: 0.3
batch_size: 16
epochs: 100
weight_decay: 0.01
split_seed: 2025
model_seed: 22
fixed_holdout_manifest_path: config/experiments/vif/twinkl_681_5_holdout.yaml
use_lr_finder: false
experiment_group: twinkl-715_recall_guardrail
class_balance_source: train_split_per_dimension
circumplex_regularizer_enabled: true
circumplex_regularizer_opposite_weight: 0.5
circumplex_regularizer_adjacent_weight: 0.1
selection_policy:
  name: qwk_then_recall_guarded
  guardrails:
    recall_minus1_floor: 0.4032
  fallback: debug_best_finite_qwk_only
model_overrides:
  BalancedSoftmax:
    learning_rate: 0.015522253574270487
    use_lr_finder: false
    learning_rate_source: explicit_model_override
    learning_rate_policy: run_015_cdwce_a3_valley
