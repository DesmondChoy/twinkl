runs_dir: logs/experiments/runs
labels_path: logs/judge_labels/judge_labels.parquet
wrangled_dir: logs/wrangled
run_ids:
  - run_020
  - run_036
models:
  - BalancedSoftmax
artifact_root: logs/experiments/artifacts
artifact_run_prefix: posthoc_twinkl_729
report_path: logs/experiments/reports/experiment_review_twinkl_729.md
report_title: Experiment Review — twinkl-729 run_020 vs run_036 BalancedSoftmax effective-prior post-hoc retargeting
report_scope_note: "Primary checkpoint target: incumbent `run_020` `BalancedSoftmax`. Best current tail-sensitive reference checkpoint: `run_036` from `twinkl-719.3`."
recommended_model_label: Recommended post-hoc BalancedSoftmax family anchor for `twinkl-729`
summary_model_order:
  - BalancedSoftmax
selection_policy:
  name: recall_minus1_then_qwk_guarded
  max_qwk_drop: 0.03
  require_non_negative_calibration: true
  rank_order:
    - recall_minus1
    - qwk_mean
    - calibration_global
    - decision_neutral_rate
softmax_logit_adjustment:
  enabled: true
  prior_source: train_split
  target_models:
    - BalancedSoftmax
  tau_grid:
    - 0.0
    - 0.3
    - 0.5
    - 0.7
    - 1.0
  effective_prior_branch:
    enabled: true
    target_models:
      - BalancedSoftmax
    prior_source: validation_posteriors
    tau_mode: per_dimension
    tau_grid:
      - 0.0
      - 0.3
      - 0.5
      - 0.7
      - 1.0
    prior_estimation:
      method: mean_posterior
      eps: 1.0e-9
corn_threshold_policy:
  enabled: false
