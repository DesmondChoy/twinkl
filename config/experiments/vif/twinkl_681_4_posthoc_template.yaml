runs_dir: logs/experiments/runs
labels_path: logs/judge_labels/judge_labels.parquet
wrangled_dir: logs/wrangled
# Replace with the two generated stage-1 run IDs before executing.
run_ids:
  - run_XXX
  - run_YYY
models:
  - BalancedSoftmax
  - LDAM_DRW
artifact_root: logs/experiments/artifacts
artifact_run_prefix: posthoc_twinkl_681_4_stage1
report_path: logs/experiments/reports/experiment_review_twinkl_681_4_stage1.md
report_title: Experiment Review — twinkl-681.4 tuned softmax long-tail comparison
recommended_model_label: Recommended stage-1 softmax leader
summary_model_order:
  - BalancedSoftmax
  - LDAM_DRW
selection_policy:
  name: recall_minus1_then_qwk_guarded
  max_qwk_drop: 0.03
  require_non_negative_calibration: true
  rank_order:
    - recall_minus1
    - qwk_mean
    - calibration_global
    - decision_neutral_rate
softmax_logit_adjustment:
  enabled: true
  prior_source: train_split
  target_models:
    - BalancedSoftmax
    - LDAM_DRW
  tau_grid:
    - 0.0
    - 0.3
    - 0.5
    - 0.7
    - 1.0
corn_threshold_policy:
  enabled: false
