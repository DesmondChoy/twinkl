study:
  setup: weekly_without_critic
  repeats: 3
  expected_personas: 204
  expected_persona_weeks: 951
  expected_calls: 2853

model:
  key: gpt_5_6_luna_low
  model: gpt-5.6-luna
  reasoning_effort: low

api:
  provider: openai
  endpoint: responses
  max_output_tokens: 2000
  timeout_seconds: 60
  max_attempts: 2
  concurrency: 4
  service_tier: default
  store: false
  max_budget_usd: 15.0
  pricing_usd_per_million_tokens:
    input: 1.00
    cached_input: 0.10
    cache_write: 1.25
    output: 6.00

smoke:
  prompt_count: 24
  repeats: 1
  max_budget_usd: 0.30
  full_run_contingency: 1.20

bootstrap:
  unit: trajectory
  random_seed: 5256000
  repeats: 10000
  interval: 0.95

decision:
  select_low: >-
    Coverage falls by no more than 0.05 and the paired trajectory bootstrap
    shows either higher Drift recall without a median increase in false Drift
    alerts, or fewer false Drift alerts without lower median Drift recall.
  otherwise: >-
    Keep gpt-5.6-luna at reasoning effort none as the development Weekly Drift
    Reviewer.
  restrictions:
    - Development-only AI-reviewed synthetic evidence; no human validation.
    - The complete development data is not a fresh final test.
    - The Weekly Drift Reviewer receives no VIF Critic input.
    - The smoke test checks execution and cost only; it is not selection evidence.
    - No prompt variant, final test, deployment approval, or runtime architecture change is tested.

artifacts:
  output_dir: logs/experiments/artifacts/twinkl_52zz_luna_low_20260714
  manifest_filename: manifest.json
  smoke_responses_filename: smoke_responses.jsonl
  responses_filename: responses_gpt_5_6_luna_low.jsonl
  metrics_filename: metrics.json
