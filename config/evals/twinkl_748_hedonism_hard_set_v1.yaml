schema_version: 1
target_version: twinkl-748-hedonism-hard-set-v1
review_prompt_version: twinkl-748-packet-only-v1
description: >-
  Parent-controlled candidate source for a Codex-reviewed Hedonism diagnostic
  hard-set. Author labels are generation intent only and never enter the
  reviewer packet or become ground truth without paired reviewer agreement.
core_values:
  - Hedonism
quality_gates:
  maximum_word_count_delta_ratio: 0.10
  minimum_normalized_similarity: 0.50
pairs:
  - pair_id: hp_001
    family: quiet_sensory_pleasure
    isolated_behavior: linger over coffee versus return to work
    affect_band: calm
    secondary_value_risk: [Achievement]
    variants:
      - variant_id: hp_001_a
        author_label: 1
        text: The meeting ended early, so I sat by the window with my coffee and let myself taste it slowly before heading back upstairs.
      - variant_id: hp_001_b
        author_label: -1
        text: The meeting ended early, so I carried my coffee back upstairs and opened the next deck before I had taken more than a sip.

  - pair_id: hp_002
    family: quiet_sensory_pleasure
    isolated_behavior: enjoy warm bath versus replace it with chores
    affect_band: tired
    secondary_value_risk: [Achievement]
    variants:
      - variant_id: hp_002_a
        author_label: 1
        text: I was worn out after the commute, but I filled the bath and stayed in the warm water until my shoulders finally loosened.
      - variant_id: hp_002_b
        author_label: -1
        text: I was worn out after the commute, but I skipped the bath and folded laundry until the tightness in my shoulders felt normal again.

  - pair_id: hp_003
