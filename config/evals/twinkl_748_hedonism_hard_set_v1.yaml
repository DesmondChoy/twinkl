    secondary_value_risk: [Achievement]
    variants:
      - variant_id: hp_003_a
        author_label: 1
        text: I made the noodles I like, put my phone away, and ate them slowly at the table while the apartment was quiet.
      - variant_id: hp_003_b
        author_label: -1
        text: I made the noodles I like, kept my laptop open, and ate them quickly at the table while answering messages from work.

