    - logs/experiments/runs/run_020_BalancedSoftmax.yaml
    - logs/experiments/runs/run_021_BalancedSoftmax.yaml
  wrangled_dir: logs/wrangled
  split: development
  week_definition: iso_monday_sunday
  expected_personas: 28
  expected_persona_weeks: 126
  expected_cases: 42
  expected_entries: 217
  expected_resolved_entry_cells: 316
  expected_resolved_trajectories: 41
  expected_reference_episodes: 5
  unresolved_case_ids:
    - case_037

study:
  setups:
    - current_prompt
    - aligned_prompt
  repeats: 3
  current_prompt_source:
    config_path: config/evals/twinkl_752_1_weekly_verifier_ablation_v1.yaml
    prompts_path: logs/experiments/artifacts/twinkl_752_1_weekly_verifier_ablation_20260712/prompts.jsonl
    responses_path: logs/experiments/artifacts/twinkl_752_1_weekly_verifier_ablation_20260712/responses.jsonl
