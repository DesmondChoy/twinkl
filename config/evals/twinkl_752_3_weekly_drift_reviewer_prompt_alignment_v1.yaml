  aligned_prompt: prompts/weekly_drift_reviewer_aligned.yaml
  conflict_rubric_path: config/evals/drift_v1_conflict_rubric_v1.yaml
  value_definitions_path: config/schwartz_values.yaml
  assess_current_week_only_for_entry_metrics: true
  assess_adjacent_pairs_ending_in_current_week: true
  entry_target_policy: reviewer_agreement_only
  drift_target_policy: reviewer_agreement_only

api:
  provider: openai
  endpoint: responses
  model: gpt-5.4-mini-2026-03-17
  reasoning_effort: none
  max_output_tokens: 3000
  timeout_seconds: 60
  max_attempts: 2
  concurrency: 4
  service_tier: default
  store: false
  max_budget_usd: 3.0
  pricing_usd_per_million_tokens:
    input: 0.75
    output: 4.50

artifacts:
  output_dir: logs/experiments/artifacts/twinkl_752_3_weekly_drift_reviewer_prompt_alignment_20260713
  prompts_filename: prompts.jsonl
  manifest_filename: manifest.json
  responses_filename: responses.jsonl
  metrics_filename: metrics.json

decision:
  prompt_limited: >-
    Aligned-prompt median Drift recall improves by at least 0.20, recovers a
    cross-week reference Drift in at least two repeats, median false Drift
    alerts do not increase, and median coverage does not fall by more than 0.05.
  unchanged: >-
    Median Drift recall does not improve and no cross-week reference Drift is
    recovered in any repeat.
  inconclusive: >-
    Any other result, including a recall gain that trades materially against
    false Drift alerts, coverage, or repeat stability.
  restrictions:
    - Development evidence only; no VIF architecture adoption or deployment approval.
    - Do not score or call the final test set.
    - Do not use the retired Drift benchmark.
    - Do not alter the AI-reviewed reference labels.
    - The result isolates prompt alignment at reasoning effort none, not an intrinsic LLM ceiling.
