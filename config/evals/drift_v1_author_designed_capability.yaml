schema_version: 1
holdout_id: twinkl_drift_v1_author_designed_capability
locked_before_scoring: true
locked_at: "2026-07-10"
purpose: >-
  Historical POC capability probe for sustained conflict on declared core
  values. These author-designed trajectories are not a promotion surface and
  must not be used for threshold selection, prompt tuning, or production claims.
review_status: designed_not_human_reviewed
label_contract: >-
  A reference episode is two adjacent -1 labels on the same declared core
  value. Null represents deliberately uncertain evidence and breaks a run.
cases:
  - case_id: positive_security_active
    persona_id: holdout_drift_001
    persona_name: Mara
    persona_age: 35-44
    persona_profession: Operations manager
    persona_culture: Singapore
    core_values: [Security]
    expected_case_state: active
    design_note: Same-day sustained conflict; remains active at cutoff.
    entries:
      - {t_index: 0, date: "2026-01-05", initial_entry: "I skipped the medical appointment again because the work queue felt more urgent, even though I know the follow-up protects my health.", core_labels: {security: -1}}
      - {t_index: 1, date: "2026-01-05", initial_entry: "I also left the prescription unfilled and told myself I would deal with the risk next month.", core_labels: {security: -1}}
      - {t_index: 2, date: "2026-01-12", initial_entry: "Another week passed and I still avoided both the appointment and the prescription refill.", core_labels: {security: -1}}

