observations: >-
  The matched-budget control confirmed the negative result from run_037. With
  nearly identical parameter count (23,606) but full 768d, QWK dropped further
  to 0.299 (fair), recall_-1 to 0.246, and minority recall to 0.346. Hedonism
  QWK collapsed to -0.045 (worse than random), ruling out a representation-level
  fix for polarity failures. Security QWK nudged up marginally (0.225 vs 0.213)
  but only alongside much heavier hedging (0.815). The lower training gap (0.160
  vs 0.347 for run_037) confirms the capacity confound was properly controlled.
  Conclusion: drop full-768d for this frontier and proceed to twinkl-732.
