  integration: holdout `qwk_mean` reached 0.393 (fair), calibration stayed high
  at 0.758 (good), and `stimulation` / `hedonism` remained at least
  competitive with the incumbent package. But the run still gave back too much
  on `recall_-1` (0.266) and overall hedging (67.8%), so it established a real
  candidate family without yet making a promotion case.
