observations: >-
  SoftOrdinal produced the strongest single-seed corrected-split QWK here at
  0.388 (fair) with minority recall 0.292 (poor) and calibration 0.781
  (moderate), while hedging stayed high at 79.6%. The gain was not uniform
  across dimensions: Hedonism collapsed below zero QWK and Security stayed weak,
  so the aggregate improvement came from a subset of dimensions rather than a
  full-task breakthrough. This run kept SoftOrdinal in the active frontier but
  foreshadowed the seed sensitivity confirmed by later reruns.
