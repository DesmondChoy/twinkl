observations: >-
  The seed-22 rerun reproduced the aggregate consensus band with holdout QWK
  0.369 (fair) and calibration 0.770 (good), but it remained highly hedged at
  68.8% and pushed `hedonism qwk` down to 0.059 while `security qwk` stayed
  fair at only 0.247. `Stimulation qwk` remained improved at 0.340, yet the
  overall package still looked too conservative and too uneven across the hard
  dimensions to support a frontier change.
