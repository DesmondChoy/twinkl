observations: >-
  CORN repeated almost the same aggregate profile as `run_016`: QWK 0.315
  (fair), calibration 0.818 (good), minority recall 0.266 (poor), and hedging
  81.3% (excessive). The very small train/val gap of 0.039 and early best epoch
  at 18 suggest this seed converged cleanly but still preferred neutral-heavy
  decisions. This reinforced the view that CORN is stable and well-calibrated on
  the corrected split, but not the most effective option for rare misalignment
  recovery.
