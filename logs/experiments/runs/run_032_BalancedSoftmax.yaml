observations: >-
  Seed-22 was the strongest tail-sensitive member of the guarded family, with
  QWK 0.366 (fair), recall_-1 0.355, minority recall 0.435, and calibration
  0.713. Even so, hedging stayed at 64.1% and the hardest dimensions remained
  hedonism (0.160), stimulation (0.196), and security (0.198), so the gain was
  incomplete rather than decisive. This seed showed the guardrail can rescue a
  better checkpoint, but not enough to replace the incumbent corrected-split
  default on family medians.
