observations: >-
  Seed 22 reproduced the broad pattern but not cleanly enough to strengthen the
  frontier case: holdout `qwk_mean` stayed respectable at 0.360 (fair) and
  `stimulation qwk` improved sharply to 0.338, but `hedonism qwk` collapsed to
  0.080 and overall hedging remained high at 70.8%. The very small selected
  train/val gap (+0.031) suggests this run was stable rather than overfit, so
  the remaining weakness looks like a formulation trade-off rather than a
  checkpoint-selection artifact.
