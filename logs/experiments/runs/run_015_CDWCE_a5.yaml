observations: Worst QWK in run_015 at 0.300 (fair) with highest hedging (89.9%) and
  lowest minority recall (0.174). Alpha=5 over-penalizes adjacent errors, causing extreme
  hedging. recall_-1 = 0.012 is effectively zero. Calibration 0.639 is the lowest in
  run_015 and near the moderate/weak boundary. Self_direction QWK collapsed to 0.188.
  The high alpha collapses to near-constant neutral predictions — confirms the Polat et al.
  finding that excessively large alpha harms performance.
