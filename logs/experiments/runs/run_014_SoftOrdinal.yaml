observations: QWK 0.388 is the best-ever SoftOrdinal result (+0.080 vs run_010 SoftOrdinal at 0.308).
  The LR finder valley LR (0.0198, ~20x configured) uniquely benefited SoftOrdinal, suggesting its
  smooth probability-based loss tolerates larger learning rates better than threshold-based losses.
  Training gap near-zero (0.0002) indicates excellent generalization. Calibration degraded from 0.860 to
