observations: >-
  The seed-33 rerun was the strongest consensus seed: holdout QWK reached 0.393
  (fair, near the top of the current board), `recall_-1` recovered to 0.338,
  minority recall to 0.480, and hedging fell to 62.3%. But the improvement was
  still not a clean hard-dimension win because `hedonism qwk` stayed weak at
  0.109 and `security` regressed to QWK 0.204 with calibration 0.454. Treat
  this as the best-case seed for the consensus branch, not evidence that the
  family solved the target dimensions consistently.
