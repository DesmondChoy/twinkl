observations: >-
  The seed-33 rerun completed the family and preserved the same boundary-shift
  pattern: test QWK reached 0.358, `recall_-1` 0.313, minority recall 0.448,
  and hedging dropped to 56.5%. Calibration fell to 0.654 and MAE/accuracy
  worsened relative to the earlier seeds, so the confirmed family is best read
  as a tail-recovery leader with a real aggregate-stability tax rather than a
  clean all-metric replacement for the safer corrected-split baselines.
