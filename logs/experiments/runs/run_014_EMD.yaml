observations: QWK 0.373 is roughly comparable to run_010 EMD (0.362, +0.011) -- the only loss where the
  LR finder valley LR did not hurt QWK. Best MAE across all run_014 losses (0.203). However calibration
  degraded substantially from 0.851 to 0.785 (-0.066). Security QWK collapsed to 0.060 (from 0.132 in
  run_010). The 20x LR was less destructive for EMD than CORAL/CORN, possibly because EMD's earth-mover
  distance operates on the full probability simplex rather than binary thresholds.
