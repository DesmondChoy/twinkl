observations: >-
  The full-768d diagnostic was negative across all core metrics. Despite
  expanding from 256d to 768d (state_dim 266→778, parameters 23,454→56,222),
  holdout QWK dropped to 0.318 (fair), recall_-1 fell to 0.269, and minority
  recall to 0.381 versus run_020's 0.378/0.342/0.449. The target hard
  dimensions both worsened: hedonism QWK 0.262→0.178 and security QWK
  0.213→0.165. The training gap of 0.347 suggests the doubled parameter count
  led to more overfitting without compensating generalization gains. This rules
  out a representation-width bottleneck for the current frontier's polarity
  failures.
