observations: >-
  SoftOrdinal recovered from the weaker seed-22 run to QWK 0.346 (fair),
  calibration 0.798 (moderate), and minority recall 0.283 (poor), with hedging
  back down to 79.5%. That rebound kept the family competitive on aggregate, but
  the spread between `run_016` and `run_017` still left SoftOrdinal as the most
  seed-volatile of the corrected-split leaders. The completed 3-seed picture
  therefore supports SoftOrdinal as a comparator, not the default carry-forward
  base.
