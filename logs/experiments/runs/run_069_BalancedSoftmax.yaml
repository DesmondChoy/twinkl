  target seed-11 baseline `run_058`, test QWK fell 0.3631 to 0.3424, minority
  recall fell 0.4456 to 0.3997, Security QWK fell 0.3389 to 0.2668, hedging
  rose 0.5968 to 0.6109, and the selected train-validation gap widened 0.1081
  to 0.1474. Calibration improved 0.6883 to 0.7241, recall_-1 edged up 0.2966
  to 0.3033, and Stimulation QWK rose 0.1628 to 0.3558, but the combined
  package is not promising enough to justify seeds 22 and 33.
