observations: >-
  The second BalancedSoftmax seed strengthened the case rather than weakening it:
  QWK rose to 0.378 (fair), recall_-1 to 0.342, minority recall to 0.449, and
  hedging dropped to 62.1%. Calibration slipped modestly to 0.713 and the
  MAE/accuracy trade-off remained real, but repeating the same tail-heavy pattern
  across two seeds makes the result unlikely to be a fluke. This run promotes
  BalancedSoftmax from a curiosity to a provisional corrected-split leader that
  now needs a seed-33 completion run.
