observations: >-
  QWK improved to 0.358 (fair) with calibration 0.762 (moderate), but
  recall_-1 only reached 0.080 and hedging stayed high at 79.6%, so the family
  still failed to convert margin reweighting into meaningful tail recovery. The
  train/val gap exploded to 1.101, which is severe overfitting by this project's
  own thresholds and much worse than every other corrected-split candidate. This
  seed confirms that LDAM-DRW is not the clean next-step winner for the current
  POC.
