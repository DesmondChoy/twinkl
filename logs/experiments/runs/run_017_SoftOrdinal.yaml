observations: >-
  SoftOrdinal fell back to QWK 0.330 (fair), calibration 0.746 (moderate), and
  minority recall 0.229 (poor), while hedging rose to 84.3% (excessive). The
  best epoch arrived at 10 with an almost zero train/val gap, so this was not a
  classic overfitting failure; it was a seed-sensitive optimization outcome that
  never found the more decisive boundary from `run_016`. This run is the clearest
  evidence that SoftOrdinal needs family-level summaries rather than best-seed
  storytelling.
