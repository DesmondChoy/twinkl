observations: >-
  LDAM-DRW stayed close to the older corrected-split baselines on MAE 0.229 and
  calibration 0.753, but QWK 0.329 and recall_-1 0.059 left it behind both
  BalancedSoftmax and CDWCE_a3 on the main objective. The train/val gap of 0.530
  was already in the overfitting regime, so the margin schedule appears to be
  more selection-optimistic than genuinely better at tail recovery here. This run
  kept LDAM-DRW interesting as a comparison point, not a frontier leader.
selection_policy:
  name: qwk_then_recall_guarded
  rank_order:
  - qwk_mean
  - recall_minus1
  - calibration_global
  - hedging_mean
  - val_loss
  guardrails:
    qwk_mean_must_be_finite: true
    qwk_nan_dims_count_must_equal_zero: true
    calibration_global_must_be_non_negative: true
  fallback: best_finite_qwk
